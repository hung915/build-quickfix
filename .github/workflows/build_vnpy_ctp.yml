name: Build vnpy_ctp manylinux2014 wheel (cp311, optimized)

on:
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Build wheel inside manylinux container
  # ============================================================
  build:
    runs-on: ubuntu-latest

    container:
      image: quay.io/pypa/manylinux2014_x86_64

    env:
      PYTHON_ROOT: /opt/python/cp311-cp311
      PATH: /opt/python/cp311-cp311/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      WHEELHOUSE: /wheelhouse

    steps:
      - name: Create python3 & pip3 shims
        run: |
          ln -sf $PYTHON_ROOT/bin/python /usr/bin/python3
          ln -sf $PYTHON_ROOT/bin/pip /usr/bin/pip3

      - name: Enable GCC 10 (C++17)
        run: |
          source /opt/rh/devtoolset-10/enable
          gcc --version
          g++ --version

      - name: Upgrade Python build tools
        run: |
          source /opt/rh/devtoolset-10/enable
          python -m pip install --upgrade \
            pip setuptools wheel build auditwheel

      - name: Build vnpy_ctp wheel
        run: |
          source /opt/rh/devtoolset-10/enable
          mkdir -p $WHEELHOUSE
          pip wheel vnpy_ctp --no-deps -w $WHEELHOUSE

      - name: Strip native symbols (safe)
        run: |
          for whl in $WHEELHOUSE/*.whl; do
            tmp=$(mktemp -d)
            unzip -q "$whl" -d "$tmp"
            find "$tmp" -name "*.so" -exec strip --strip-unneeded {} \; || true
            find "$tmp" -name "*.a" -delete
            new="${whl%.whl}-stripped.whl"
            (cd "$tmp" && zip -9 -qr "$new" .)
            rm -rf "$tmp"
            mv "$new" "$whl"
          done

      - name: Auditwheel repair (manylinux2014)
        run: |
          auditwheel repair $WHEELHOUSE/*.whl -w $WHEELHOUSE/repaired

      - name: Prepare dist directory
        run: |
          mkdir -p dist
          cp $WHEELHOUSE/repaired/*.whl dist/

      # ✅ Job-to-job transfer
      - name: Upload wheel to workflow storage
        uses: actions/upload-artifact@v4
        with:
          name: wheel-dist
          path: dist/*.whl

  # ============================================================
  # Job 2: Upload artifact on host runner (GLIBC OK)
  # ============================================================
  upload:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-dist
          path: dist

      - name: Verify wheel
        run: |
          ls -lh dist

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnpy_ctp-manylinux2014-cp311-optimized
          path: dist/*.whl
