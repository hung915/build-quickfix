name: Build vnpy_ctp manylinux2014 wheel (cp311, optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: quay.io/pypa/manylinux2014_x86_64

    env:
      PYTHON_ROOT: /opt/python/cp311-cp311
      PATH: /opt/python/cp311-cp311/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      WHEELHOUSE: /wheelhouse

    steps:
      # ------------------------------------------------------------
      # 1️⃣ python3 / pip3 shim (CRITICAL)
      # ------------------------------------------------------------
      - name: Create python3 & pip3 shims
        run: |
          ln -sf $PYTHON_ROOT/bin/python /usr/bin/python3
          ln -sf $PYTHON_ROOT/bin/pip /usr/bin/pip3

      - name: Verify Python
        run: |
          python -V
          python3 -V
          pip -V

      # ------------------------------------------------------------
      # 2️⃣ System tools (already available, just ensure basics)
      # ------------------------------------------------------------
      - name: Install basic tools
        run: |
          yum install -y \
            zip unzip binutils git cmake

      # ------------------------------------------------------------
      # 3️⃣ Enable GCC 10 (C++17 support, PREINSTALLED ✅)
      # ------------------------------------------------------------
      - name: Enable devtoolset-10 (C++17)
        run: |
          source /opt/rh/devtoolset-10/enable
          gcc --version
          g++ --version

      # ------------------------------------------------------------
      # 4️⃣ Python build tooling
      # ------------------------------------------------------------
      - name: Upgrade Python build tools
        run: |
          source /opt/rh/devtoolset-10/enable
          python -m pip install --upgrade \
            pip setuptools wheel build auditwheel

      # ------------------------------------------------------------
      # 5️⃣ Build wheel
      # ------------------------------------------------------------
      - name: Build vnpy_ctp wheel
        run: |
          source /opt/rh/devtoolset-10/enable
          mkdir -p $WHEELHOUSE
          pip wheel vnpy_ctp --no-deps -w $WHEELHOUSE

      # ------------------------------------------------------------
      # 6️⃣ Strip symbols (BIG size reduction)
      # ------------------------------------------------------------
      - name: Strip native libraries
        run: |
          for whl in $WHEELHOUSE/*.whl; do
            mkdir tmp
            unzip -q "$whl" -d tmp
            find tmp -name "*.so" -exec strip --strip-unneeded {} \; || true
            find tmp -name "*.a" -delete
            rm "$whl"
            (cd tmp && zip -9 -qr "../$(basename "$whl")" .)
            rm -rf tmp
          done

      - name: Copy wheel to workspace
        run: |
          cp $WHEELHOUSE/*.whl $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnpy_ctp-manylinux2014-cp311-optimized
          path: "*.whl"