name: Build VNPy CTP Wheels

on:
  workflow_dispatch:

jobs:
  build-vnpy_ctp-al2023:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make cmake swig git \
            python3.11 python3.11-devel python3.11-pip \
            tar gzip findutils

      - name: Install Python build tools
        run: python3.11 -m pip install --upgrade pip setuptools wheel build

      - name: Build wheel
        run: pip3 wheel vnpy_ctp --wheel-dir /output/

      - name: Copy wheel to workspace
        run: cp /output/*.whl $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnpy_ctp-al2023-cp311
          path: "*.whl"
