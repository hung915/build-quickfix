name: Build vnpy_ctp manylinux2014 wheel (cp311, optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: quay.io/pypa/manylinux2014_x86_64

    env:
      PATH: /opt/python/cp311-cp311/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      WHEELHOUSE: /wheelhouse

    steps:
      # 🔥 CRITICAL FIX
      - name: Create python3 shim
        run: |
          ln -sf /opt/python/cp311-cp311/bin/python /usr/bin/python3
          ln -sf /opt/python/cp311-cp311/bin/pip /usr/bin/pip3

      - name: Verify Python
        run: |
          which python
          which python3
          python -V
          python3 -V
          pip -V
          pip3 -V

      - name: Install system build dependencies
        run: |
          yum install -y \
            gcc gcc-c++ make cmake git \
            zip unzip binutils

      - name: Upgrade Python build tools
        run: |
          python -m pip install --upgrade \
            pip setuptools wheel build auditwheel

      - name: Build vnpy_ctp wheel
        run: |
          mkdir -p $WHEELHOUSE
          pip wheel vnpy_ctp --no-deps -w $WHEELHOUSE

      - name: Strip debug symbols (huge size reduction)
        run: |
          for whl in $WHEELHOUSE/*.whl; do
            mkdir tmp
            unzip -q "$whl" -d tmp
            find tmp -name "*.so" -exec strip --strip-unneeded {} \; || true
            find tmp -name "*.a" -delete
            rm "$whl"
            (cd tmp && zip -9 -qr "../$(basename "$whl")" .)
            rm -rf tmp
          done

      - name: Repair wheel for manylinux2014
        run: |
          auditwheel repair $WHEELHOUSE/*.whl -w $WHEELHOUSE/repaired

      - name: Show final wheel
        run: |
          ls -lh $WHEELHOUSE/repaired

      - name: Copy wheel to workspace
        run: |
          cp $WHEELHOUSE/repaired/*.whl $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnpy_ctp-manylinux2014-cp311-optimized
          path: "*.whl"