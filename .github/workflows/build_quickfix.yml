name: Build QuickFIX Wheels

on:
  workflow_dispatch:

jobs:
  build-al2023:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make cmake swig git \
            python3.13 python3.13-devel python3.13-pip \
            tar gzip findutils

      - name: Install Python build tools
        run: python3.13 -m pip install --upgrade pip setuptools wheel build

      - name: Build wheel
        run: pip3 wheel quickfix --wheel-dir /output/

      - name: Verify glibc requirement
        run: |
          dnf install -y binutils

          # Unzip wheel contents
          unzip -o /output/*.whl -d /tmp/wheel_contents/

          # Find the .so file
          echo "=== .so file found ==="
          find /tmp/wheel_contents/ -name "*.so" -type f

          SO_FILE=$(find /tmp/wheel_contents/ -name "*.so" -type f | head -1)

          # Show all GLIBC versions required
          echo ""
          echo "=== GLIBC versions required by $SO_FILE ==="
          objdump -p "$SO_FILE" | grep GLIBC

          # Extract and show only the version numbers clearly
          echo ""
          echo "=== GLIBC version numbers ==="
          objdump -p "$SO_FILE" | grep -oP 'GLIBC_\K[\d.]+' | sort -V | uniq

          # Show the MAX glibc version required
          echo ""
          echo "=== MAX GLIBC version required ==="
          MAX_GLIBC=$(objdump -p "$SO_FILE" | grep -oP 'GLIBC_\K[\d.]+' | sort -V | tail -1)
          echo "Max GLIBC required: $MAX_GLIBC"

          # Compare against AL2023 glibc (2.34)
          echo ""
          echo "=== Compatibility Check ==="
          REQUIRED=$(echo "$MAX_GLIBC" | awk -F. '{printf "%d%03d%03d", $1, $2, $3}')
          TARGET=$(echo "2.34" | awk -F. '{printf "%d%03d%03d", $1, $2, $3}')
          if [ "$REQUIRED" -le "$TARGET" ]; then
            echo "✅ COMPATIBLE: Max GLIBC $MAX_GLIBC <= 2.34 (AL2023)"
          else
            echo "❌ INCOMPATIBLE: Max GLIBC $MAX_GLIBC > 2.34 (AL2023)"
            exit 1  # fail the workflow if incompatible
          fi
      - name: Copy wheel to workspace
        run: cp /output/*.whl $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfix-al2023-cp313
          path: "*.whl"

