name: Build QuickFIX Wheels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-al2:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2

    steps:
      - name: Install build dependencies
        run: |
          yum install -y \
            gcc gcc-c++ make cmake swig git \
            python3 python3-devel \
            tar gzip findutils

      - name: Install Python 3.9
        run: |
          yum install -y openssl-devel bzip2-devel libffi-devel zlib-devel
          cd /tmp
          curl -O https://www.python.org/ftp/python/3.9.18/Python-3.9.18.tgz
          tar xzf Python-3.9.18.tgz
          cd Python-3.9.18
          ./configure --enable-optimizations
          make altinstall

      - name: Install Python build tools
        run: python3.9 -m pip install --upgrade pip setuptools wheel build

      - name: Build wheel
        run: python3.9 -m pip wheel quickfix --wheel-dir /output/

      - name: Create staging release and upload wheel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          TAG="wheel-cache-${RUN_ID}"

          echo ">>> Creating draft release: $TAG"
          RESPONSE=$(curl -f -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"draft\":true,\"body\":\"Staging\"}")

          echo ">>> Release created"

          UPLOAD_URL=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")

          echo ">>> Upload URL: $UPLOAD_URL"

          for whl in /output/*.whl; do
            fname=$(basename "$whl")
            echo ">>> Uploading: $fname"
            curl -f -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$whl" \
              "${UPLOAD_URL}?name=${fname}"
            echo ">>> Done: $fname"
          done