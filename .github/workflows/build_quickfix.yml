name: Build QuickFIX Wheels

on:
  workflow_dispatch:

jobs:
  build-al2:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2

    steps:
      - name: Install build dependencies
        run: |
          yum install -y \
            gcc gcc-c++ make cmake swig git \
            python3 python3-devel \
            tar gzip findutils

      - name: Install Python 3.9
        run: |
          yum install -y openssl-devel bzip2-devel libffi-devel zlib-devel
          cd /tmp
          curl -O https://www.python.org/ftp/python/3.9.18/Python-3.9.18.tgz
          tar xzf Python-3.9.18.tgz
          cd Python-3.9.18
          ./configure --enable-optimizations
          make altinstall

      - name: Install Python build tools
        run: python3.9 -m pip install --upgrade pip setuptools wheel build

      - name: Build wheel
        run: python3.9 -m pip wheel quickfix --wheel-dir /output/

      - name: Copy wheel to workspace
        run: cp /output/*.whl $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfix-al2-cp39
          path: "*.whl"