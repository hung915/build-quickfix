name: Build QuickFIX Wheels

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Clone QuickFIX source
        run: git clone https://github.com/quickfix/quickfix.git .

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SWIG
        run: choco install swig -y

      - name: Install build tools
        run: pip install --upgrade pip setuptools wheel build

      - name: Build wheel
        run: python -m build --wheel --outdir ./dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfix-windows-cp313
          path: dist/*.whl

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ \
            python3.13 python3.13-dev \
            swig cmake make git

      - name: Clone QuickFIX source
        run: git clone https://github.com/quickfix/quickfix.git .

      - name: Install build tools
        run: python3.13 -m pip install --upgrade pip setuptools wheel build

      - name: Build wheel
        run: python3.13 -m build --wheel --outdir ./dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfix-linux-cp313
          path: dist/*.whl