  build-al2023:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make cmake swig git \
            python3.13 python3.13-devel python3.13-pip \
            tar gzip findutils unzip

      - name: Install Python build tools
        run: |
          python3.13 -m pip install --upgrade pip
          python3.13 -m pip install setuptools wheel build

      - name: Clone quickfix-package
        run: git clone https://github.com/quickfix/quickfix-package.git /build

      - name: Clone quickfix into quickfix-package
        working-directory: /build
        run: git clone https://github.com/quickfix/quickfix ./quickfix

      - name: Run package script
        working-directory: /build
        run: chmod +x package-python.sh && ./package-python.sh

      - name: Build wheel
        working-directory: /build/quickfix-python
        run: |
          python3.13 -m pip install setuptools wheel build
          python3.13 -m pip wheel . --wheel-dir /output/ --no-deps

      - name: Verify glibc requirement
        run: |
          dnf install -y binutils
          unzip -o /output/*.whl -d /tmp/wheel_contents/
          objdump -p /tmp/wheel_contents/_quickfix*.so | grep GLIBC
          echo "--- Max GLIBC version above should be 2.34 or lower ---"

      - name: Copy wheel to workspace
        run: cp /output/*.whl $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfix-al2023-cp313
          path: "*.whl"