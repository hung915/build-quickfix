name: Build QuickFIX Wheels

on:
  workflow_dispatch:

jobs:
  build-al2023:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make cmake swig git \
            python3.13 python3.13-devel python3.13-pip \
            tar gzip findutils

      - name: Install Python build tools
        run: python3.13 -m pip install --upgrade pip setuptools wheel build

      - name: Clone quickfix-package
        run: git clone https://github.com/quickfix/quickfix-package.git /build

      - name: Run package script
        working-directory: /build
        run: chmod +x package-python.sh && ./package-python.sh

      - name: Build wheel
        working-directory: /build/quickfix-python
        run: python3.13 -m build --wheel --outdir /output/

      - name: Copy wheel to workspace
        run: cp /output/*.whl $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfix-al2023-cp313
          path: "*.whl"